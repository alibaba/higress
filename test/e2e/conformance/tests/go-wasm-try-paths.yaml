apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
  name: wasmplugin-try-paths
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/foo"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: try-paths
  namespace: higress-system
spec:
  defaultConfigDisable: false
  matchRules:
    - config:
        servicePort: 8080
        host: infra-backend-v2.higress-conformance-infra.svc.cluster.local
        tryPaths:
          - /path1
      configDisable: false
      ingress:
        - higress-conformance-infra/wasmplugin-try-paths
  url: oci://higress-registry.cn-hangzhou.cr.aliyuncs.com/plugins/try-paths:1.0.0
